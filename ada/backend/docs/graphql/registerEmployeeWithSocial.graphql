# Pega esta mutation en GraphiQL: http://localhost:8080/ADA_ENTERPISE_CORE/graphiql

mutation Register($input: SocialEmployeeInput!) {
  registerEmployeeWithSocial(input: $input) {
    id
    externalId
    mainEmail
    statusId
    typeId
    role
  }
}

